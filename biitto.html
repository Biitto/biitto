<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><b>Biitto</b></title>
  <style>
    :root {
      --bg: #ccf20f;
      --fg: #000000;
      --scale: 2.109375; /* 1024 -> 2160 exact */
      --offset-x: 300px; /* centers 1536-wide artwork in 3840 canvas */
      --offset-y: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--bg);
    }

    .art {
      transform: translate(var(--offset-x), var(--offset-y)) scale(var(--scale));
      transform-origin: top left;
    }

    .letter {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: reveal 700ms cubic-bezier(.2,.9,.2,1) forwards;
    }

    .letter > g {
      animation: messyMove 1.6s ease-in-out infinite;
    }

    .b  { animation-delay: 0.05s; }
    .i1 { animation-delay: 0.20s; }
    .i2 { animation-delay: 0.35s; }
    .t1 { animation-delay: 0.50s; }
    .t2 { animation-delay: 0.65s; }
    .o  { animation-delay: 0.80s; }

    .b  > g { animation-delay: 0.00s; }
    .i1 > g { animation-delay: 0.08s; }
    .i2 > g { animation-delay: 0.16s; }
    .t1 > g { animation-delay: 0.24s; }
    .t2 > g { animation-delay: 0.32s; }
    .o  > g { animation-delay: 0.40s; }

    .shine {
      mix-blend-mode: screen;
      opacity: 0;
      animation: shine 1.8s ease-in-out 0.5s infinite;
    }

    .outline {
      fill: none;
      stroke: rgba(255,255,255,0.22);
      stroke-width: 6;
      opacity: 0.12;
      animation: outlinePulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: translateY(50px) scale(0.94);
      }
      65% {
        opacity: 1;
        transform: translateY(-6px) scale(1.015);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes messyMove {
      0% {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
      }
      25% {
        transform: translate(-6px, 4px) rotate(-1.2deg) scale(1.02);
      }
      50% {
        transform: translate(5px, -5px) rotate(1deg) scale(0.98);
      }
      75% {
        transform: translate(-3px, 6px) rotate(-0.6deg) scale(1.015);
      }
      100% {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
      }
    }
      50% {
        transform: scale(1.028);
        filter: drop-shadow(0 0 22px rgba(255,255,255,0.22));
      }
    }

    @keyframes outlinePulse {
      0%, 100% { opacity: 0.10; }
      50% { opacity: 0.42; }
    }

    @keyframes shine {
      0%, 15% {
        transform: translateX(-1100px) skewX(-16deg);
        opacity: 0;
      }
      28% { opacity: 0.32; }
      60% {
        transform: translateX(1150px) skewX(-16deg);
        opacity: 0.32;
      }
      100% {
        transform: translateX(1400px) skewX(-16deg);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter,
      .letter > g,
      .shine {
        animation: none !important;
        opacity: 1;
      }
    }
  </style>
